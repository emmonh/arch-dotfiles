########################
### MY HYPRLAND.CONF ###
########################

### MONITORS ###
# https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,auto

### MY PROGRAMS ###
# https://wiki.hypr.land/Configuring/Keywords/
$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun
$clipboard = cursor-clip
$colorPicker = hyprpicker
$authAgent = hyprpolkitagent
$statusBar = waybar
$imf = ibus
$vpn = mullvad-vpn
$hyprsunset = hyprsunset

# Daemons
$clipboardDaemon = cursor-clip --daemon
$notificationDaemon = /usr/bin/dunst
$wallpaperDaemon = awww-daemon

### AUTOSTART ###
# Autostart necessary processes (like notifications daemons, status bars, etc.)
exec-once = $hyprsunset
exec-once = $statusBar
exec-once = $notificationDaemon
exec-once = systemctl --user start $authAgent
exec-once = $clipboardDaemon
exec-once = $wallpaperDaemon
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = $vpn
#exec-once = $imf start --type wayland

### ENVIRONMENT VARIABLES ###
# https://wiki.hypr.land/Configuring/Environment-variables/
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

### PERMISSIONS ###
# https://wiki.hypr.land/Configuring/Permissions/

# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


### APPEARANCE ###
source = ~/.config/hypr/configs/appearance.conf

### INPUT ###
source = ~/.config/hypr/configs/input.conf

### KEYBINDINGS ###
source = ~/.config/hypr/configs/keybinds.conf

### WINDOWS AND WORKSPACES ###
source = ~/.config/hypr/configs/windowsAndWorkspaces.conf
