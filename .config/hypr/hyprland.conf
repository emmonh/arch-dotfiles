# ########################
# ### MY HYPRLAND.CONF ###
# ########################

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


# ################
# ### MONITORS ###
# ################

# https://wiki.hypr.land/Configuring/Monitors/
monitor=,preferred,auto,auto

# ###################
# ### MY PROGRAMS ###
# ###################


# https://wiki.hypr.land/Configuring/Keywords/
# Set programs that you use
$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun
$clipboard = cursor-clip
$colorPicker = hyprpicker
$authAgent = hyprpolkitagent
$statusBar = waybar
$imf = ibus

# Daemons
$clipboardDaemon = cursor-clip --daemon
$notificationDaemon = /usr/bin/dunst
$wallpaperDaemon = awww-daemon

# #################
# ### AUTOSTART ###
# #################

# Autostart necessary processes (like notifications daemons, status bars, etc.)

exec-once = $statusBar
exec-once = $notificationDaemon
exec-once = systemctl --user start $authAgent
exec-once = $clipboardDaemon
exec-once = $wallpaperDaemon
exec-once = $imf start --type wayland

# #############################
# ### ENVIRONMENT VARIABLES ###
# #############################

# https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


# ###################
# ### PERMISSIONS ###
# ###################

# https://wiki.hypr.land/Configuring/Permissions/

# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


# #####################
# ### LOOK AND FEEL ###
# #####################

# https://wiki.hypr.land/Configuring/Variables/
# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 3
    gaps_out = 5

    border_size = 3

    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Check https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}
# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 8
    rounding_power = 5
    active_opacity = 1.0
    inactive_opacity = 1.0 
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 2
        passes = 1
        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

# https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule {
#     name = no-gaps-wtv1
#     match:float = false
#     match:workspace = w[tv1]
#
#     border_size = 0
#     rounding = 0
# }
#
# windowrule {
#     name = no-gaps-f1
#     match:float = false
#     match:workspace = f[1]
#
#     border_size = 0
#     rounding = 0
# }

# https://wiki.hypr.land/Configuring/Dwindle-Layout/
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# https://wiki.hypr.land/Configuring/Master-Layout/
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


# #############
# ### INPUT ###
# #############

# https://wiki.hypr.land/Configuring/Variables/#input

# My prefered keyboard is English US (intl)
# Possible remap options allowed with kb_options can be seen in /usr/share/X11/xkb/rules/base.lst
# layouts and variants can be listed with localectl list-x11-keymap-<layouts/variants>

input {
    kb_layout = us
    kb_variant = intl

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

# https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


# ###################
# ### KEYBINDINGS ###
# ###################

# If a key is unclear or does not work check
# https://wiki.hypr.land/Configuring/Binds/#uncommon-syms--binding-with-a-keycode

# Looks like the system is not case-sensitive with key names in keybinds, DONT ASSUME it is like this for other sections.
# bind = non-repeatable bind (to not start 3 browsers if held down, for example)
# binde = repeatable bind (for things like volume or brightness controls)
# bindl = same as bind but also works when screen's blocked
# bindel = same as binde but also works when screen's blocked

# --- Commands asigned an alias for clarity ---
$screenshot = mkdir -p ~/.screenshots && grim ~/.screenshots/screenshot_$(date +%d_%b_%Y_%H%M%S).png 
$screenRegionScreenshot = mkdir -p ~/.screenshots && slurp | grim -g - - | tee ~/.screenshots/screenshot_$(date +%d_%b_%Y_%H%M%S).png 
$waybarRestart = /bin/bash ~/.config/hypr/scripts/wbrestart.sh
$wallpaperChange = /bin/bash ~/.config/hypr/scripts/wpchange.sh

# --- Modifier Keys ---
$mainMod = super               # Sets "Windows" key as main modifier.

# --- Hyprland control ---
bind = $mainMod ctrl, r, exec, $waybarRestart
bind = ctrl alt, delete, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# --- Open programs ---
bind = $mainMod, return, exec, $terminal        
bind = $mainMod, e, exec, $fileManager
bind = $mainMod, r, exec, $menu
bind = $mainMod, b, exec, xdg-open "https://"  # default browser
bind = $mainMod, v, exec, $clipboard
bind = $mainMod, c, exec, $colorPicker
bind = $mainMod, p, exec, $wallpaperChange
bind = $mainMod, s, exec, $screenshot
bind = $mainMod shift, s, exec, $screenRegionScreenshot

# --- Window management ---
# Close windows
bind = $mainMod, w, killactive,                # Close active window 
bind = $mainMod shift, w, forcekillactive,

# Floating and Fullscreen
bind = $mainMod, t, togglefloating,        
bind = $mainMod, f, fullscreen, 1 toggle       # Maximize active window
bind = $mainMod shift, f, fullscreen, 0 toggle # Fullscreen active window

# Window resize via keyboard
binde = $mainMod ctrl, h, resizeactive, -50 0
binde = $mainMod ctrl, l, resizeactive, 50 0
binde = $mainMod ctrl, k, resizeactive, 0 -50
binde = $mainMod ctrl, j, resizeactive, 0 50

# Move focus with mod + HJKL
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Swap window in current layout
bind = $mainMod shift, h, swapwindow, l
bind = $mainMod shift, l, swapwindow, r
bind = $mainMod shift, k, swapwindow, u
bind = $mainMod shift, j, swapwindow, d

# Switch workspaces with mod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6

# Move active window to a workspace with mod + SHIFT + [0-9]
bind = $mainMod shift, 1, movetoworkspace, 1
bind = $mainMod shift, 2, movetoworkspace, 2
bind = $mainMod shift, 3, movetoworkspace, 3
bind = $mainMod shift, 4, movetoworkspace, 4
bind = $mainMod shift, 5, movetoworkspace, 5
bind = $mainMod shift, 6, movetoworkspace, 6

# Scroll through existing workspaces with mod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = ,XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindel = ,XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# ##############################
# ### WINDOWS AND WORKSPACES ###
# ##############################

# https://wiki.hypr.land/Configuring/Window-Rules/
# https://wiki.hypr.land/Configuring/Workspace-Rules/

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}
