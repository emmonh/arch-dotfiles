# Auto-generated by matugen — do not edit by hand
# Source: rice/templates/kitty_colors.conf
# NOTE: kitty only accepts hex (#rrggbb); rgba is not supported here.
#
# The 16 ANSI colors are derived from the four accent roles (error, primary,
# secondary, tertiary) with matugen's `set_lightness` filter (0-100 scale).
# Three lightness tiers keep every slot distinct while staying readable and
# saturated (the plain "fixed" tones looked washed out / too white):
#   - 56  -> normal colors          (color1-4)
#   - 68  -> mid filler / extras     (color5-6, color13-14)
#   - 74  -> bright colors           (color9-12)
# Material You only yields ~4 hue families, so the magenta/cyan slots
# (5/6/13/14) reuse those hues at different lightness rather than adding
# new hues; this maximizes distinction within the palette's limits.

# Base
background {{colors.background.default.hex}}
foreground {{colors.on_background.default.hex}}

selection_background {{colors.primary.default.hex}}
selection_foreground {{colors.on_primary.default.hex}}

cursor {{colors.primary.default.hex}}
cursor_text_color {{colors.on_primary.default.hex}}

url_color {{colors.tertiary.default.hex | set_lightness: 70}}

# Normal colors (color0-7)
# black  -> elevated surface so it stays a visible dark anchor
color0  {{colors.surface_container_highest.default.hex}}
# red
color1  {{colors.error.default.hex | set_lightness: 56}}
# green
color2  {{colors.primary.default.hex | set_lightness: 56}}
# yellow
color3  {{colors.secondary.default.hex | set_lightness: 56}}
# blue
color4  {{colors.tertiary.default.hex | set_lightness: 56}}
# magenta -> primary, lighter tier to separate from color2
color5  {{colors.primary.default.hex | set_lightness: 68}}
# cyan    -> tertiary, lighter tier to separate from color4
color6  {{colors.tertiary.default.hex | set_lightness: 68}}
# white -> dim foreground
color7  {{colors.on_surface_variant.default.hex}}

# Bright colors (color8-15)
# bright black -> outline (visible gray)
color8  {{colors.outline.default.hex}}
# bright red
color9  {{colors.error.default.hex | set_lightness: 74}}
# bright green
color10 {{colors.primary.default.hex | set_lightness: 74}}
# bright yellow
color11 {{colors.secondary.default.hex | set_lightness: 74}}
# bright blue
color12 {{colors.tertiary.default.hex | set_lightness: 74}}
# bright magenta -> secondary, mid tier (distinct from color3/color11)
color13 {{colors.secondary.default.hex | set_lightness: 68}}
# bright cyan    -> error, mid tier (distinct from color1/color9)
color14 {{colors.error.default.hex | set_lightness: 68}}
# bright white -> brightest foreground
color15 {{colors.on_surface.default.hex}}
